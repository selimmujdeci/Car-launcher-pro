<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#060d1a"/>
  <!-- Outer ring glow -->
  <circle cx="16" cy="16" r="11" stroke="#3b82f6" stroke-width="2.5" fill="none" opacity="0.2"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="11" stroke="#3b82f6" stroke-width="1.5" fill="none"/>
  <!-- Center hub -->
  <circle cx="16" cy="16" r="3" fill="#3b82f6"/>
  <!-- Top spoke -->
  <line x1="16" y1="5" x2="16" y2="13" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Bottom-left spoke -->
  <line x1="5.7" y1="21.5" x2="12.8" y2="17.3" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Bottom-right spoke -->
  <line x1="26.3" y1="21.5" x2="19.2" y2="17.3" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round"/>
</svg>
