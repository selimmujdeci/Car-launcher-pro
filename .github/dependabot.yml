# Dependabot — CarOS Pro
# Politika (CLAUDE.md + AI.md ile uyumlu):
#  - Saha stabilitesi önceliklidir → major bump'lar OTOMATİK PR AÇMAZ (ignore).
#  - Yalnız güvenlik + minör/yama güncellemeleri, gruplu, düşük limit.
#  - Copyleft/NC bağımlılık yasağı ayrıca license-check workflow'unda zorlanır.
version: 2

updates:
  # ── Kök: araç uygulaması (npm) ──
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "area:app"
    commit-message:
      prefix: "chore(deps)"
    groups:
      # İlgili minör/yama güncellemelerini tek PR'da topla (gürültüyü azalt)
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Major bump'lar saha stabilitesini bozabilir → elle değerlendirilir
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── Website: Next.js PWA (npm) ──
  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "area:website"
    commit-message:
      prefix: "chore(deps)"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions'ın kendi sürümleri ──
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "area:ci"
    commit-message:
      prefix: "chore(ci)"
