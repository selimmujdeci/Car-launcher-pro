# ─────────────────────────────────────────────────────────────────────────────
# CarOS Pro — License Compliance Gate
#
# CLAUDE.md ticari lisans kuralını CI'da ZORLAR: ürün ticari olarak satılacak,
# bu yüzden copyleft (GPL/AGPL/LGPL/SSPL/EUPL) ve Non-Commercial (NC) bağımlılık
# YASAK. Böyle bir lisans bulunursa build kırılır.
# ─────────────────────────────────────────────────────────────────────────────
name: License Check

on:
  push:
    branches: [main, dev]
    paths:
      - "package.json"
      - "package-lock.json"
      - "website/package.json"
      - "website/package-lock.json"
      - ".github/workflows/license-check.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "package.json"
      - "package-lock.json"
      - "website/package.json"
      - "website/package-lock.json"
      - ".github/workflows/license-check.yml"
  schedule:
    - cron: "0 5 * * 1"   # haftalık güvence taraması

concurrency:
  group: license-${{ github.ref }}
  cancel-in-progress: true

# Yasak lisans desenleri (license-checker --failOn ';' ile ayırır)
env:
  FORBIDDEN: "GPL-2.0;GPL-3.0;AGPL-1.0;AGPL-3.0;LGPL-2.0;LGPL-2.1;LGPL-3.0;SSPL-1.0;EUPL-1.1;EUPL-1.2;CC-BY-NC-4.0"

jobs:
  root-app:
    name: Araç uygulaması (kök)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci --prefer-offline
      - name: Yasak lisans taraması
        run: npx --yes license-checker --production --summary --failOn "$FORBIDDEN"

  website:
    name: Website (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Install dependencies
        run: npm ci --prefer-offline
      - name: Yasak lisans taraması
        run: npx --yes license-checker --production --summary --failOn "$FORBIDDEN"
