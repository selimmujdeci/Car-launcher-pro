# ─────────────────────────────────────────────────────────────────────────────
# CarOS Pro — Website / Companion PWA (Next.js) CI
#
# website/ AYRI bir package.json/node_modules. Yalnız website/ değişince koşar
# (path filter) → araç CI'ını (main.yml) etkilemez, dakika israf etmez.
# ─────────────────────────────────────────────────────────────────────────────
name: Website CI

on:
  push:
    branches: [main, dev]
    paths:
      - "website/**"
      - ".github/workflows/website.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "website/**"
      - ".github/workflows/website.yml"

concurrency:
  group: website-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    env:
      # Build-time placeholder'lar; gerçek değerler Vercel'de tutulur
      NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL      || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build
        run: npm run build
