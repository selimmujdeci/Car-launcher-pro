# ─────────────────────────────────────────────────────────────────────────────
# CarOS Pro — E2E (Playwright)
#
# main.yml'dan AYRI: kritik user-flow'ları (boot, OBD mock, tema, safety) doğrular.
# Dakika tasarrufu için PR'da otomatik DEĞİL; gecelik + elle tetiklenir.
# ─────────────────────────────────────────────────────────────────────────────
name: E2E

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 3 * * *"   # her gün 03:00 UTC (gecelik regresyon)

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL      || 'https://placeholder.supabase.co' }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14
