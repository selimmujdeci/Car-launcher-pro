<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#060d1a" />
    <title>Caros Pro</title>
    <!-- Inter font: async (non-blocking) — internet yoksa system-ui kullanılır, sayfa beklemez -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" onload="this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" /></noscript>
    <!-- Kritik fallback: font yüklenemese de sistem fontu devreye girer -->
    <style>
      html, body { font-family: 'Inter', system-ui, -apple-system, sans-serif; margin: 0; padding: 0; }
      html, body, #root { height: 100%; width: 100%; overflow: hidden; }
      body { background: #060d1a; color: #e2e8f0; }
      #root { background: #060d1a; }
    </style>
  </head>
  <body style="background:#060d1a;margin:0;padding:0;overflow:hidden;">

    <!-- Çökme kurtarma katmanı: normal açılışta GÖRÜNMEZ (yalnız koyu zemin).
         Açılış görselini React içindeki sinematik BootSplash sağlar; buradaki
         "Caros Pro / Başlatılıyor..." ön-yükleyici kaldırıldı (kullanıcı isteği).
         React 10 sn içinde açılmazsa "BAŞLATILAMADI" + Yeniden Dene burada belirir. -->
    <div id="safe-loader" style="
      position:fixed;top:0;left:0;right:0;bottom:0;
      z-index:99999;
      background:#060d1a;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#e2e8f0;
      font-family:system-ui,sans-serif;
      text-align:center;
      padding:24px;
    "></div>

    <script>
    // Global error capture — React başlamadan önceki hataları yakalar
    var bootstrapError = null;
    window.onerror = function(msg, url, line, col, error) {
      bootstrapError = msg + " (satır: " + line + ")";
      console.error("Bootstrap Crash:", msg, error);
      return false;
    };

    (function() {
      try {
        var checkInterval = setInterval(function() {
          var root = document.getElementById('root');
          var loader = document.getElementById('safe-loader');
          if (root && root.childElementCount > 0 && loader) {
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 200ms';
            setTimeout(function() {
              if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
            }, 250);
            clearInterval(checkInterval);
          }
        }, 200);

        // 10 saniye sonra hala açılmadıysa: kurtarma ekranını GÖSTER
        // (normalde görünmeyen safe-loader içinde hata + Yeniden Dene kurulur).
        setTimeout(function() {
          var root = document.getElementById('root');
          var loader = document.getElementById('safe-loader');
          if (root && root.childElementCount === 0 && loader) {
            var box = document.createElement('div');
            box.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:16px;max-width:300px;';

            var status = document.createElement('div');
            status.style.cssText = 'font-size:15px;font-weight:bold;color:#ef4444;letter-spacing:0.1em;';
            status.textContent = 'BAŞLATILAMADI';
            box.appendChild(status);

            var errBox = document.createElement('div');
            errBox.style.cssText = 'background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);padding:12px;border-radius:8px;font-size:11px;color:#f87171;font-family:monospace;';
            errBox.textContent = bootstrapError || 'Bilinmeyen bir script hatası veya ağ sorunu oluştu.';
            box.appendChild(errBox);

            var retryBtn = document.createElement('button');
            retryBtn.textContent = 'YENİDEN DENE';
            retryBtn.onclick = function() { window.location.reload(); };
            retryBtn.style.cssText = 'padding:10px 20px;background:#3b82f6;color:white;border:none;border-radius:8px;font-weight:bold;';
            box.appendChild(retryBtn);

            loader.appendChild(box);
          }
        }, 10000);
      } catch(e) {}
    })();
    </script>

    <div id="root" style="position:fixed;top:0;left:0;right:0;bottom:0;width:100%;height:100%;background:#060d1a;overflow:hidden;"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
