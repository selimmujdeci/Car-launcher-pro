<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#060d1a" />
    <title>CockpitOS</title>
    <!-- Inter font: async (non-blocking) — internet yoksa system-ui kullanılır, sayfa beklemez -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" onload="this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" /></noscript>
    <!-- Kritik fallback: font yüklenemese de sistem fontu devreye girer -->
    <style>
      html, body { font-family: 'Inter', system-ui, -apple-system, sans-serif; margin: 0; padding: 0; }
      html, body, #root { height: 100%; width: 100%; overflow: hidden; }
      body { background: #060d1a; color: #e2e8f0; }
      #root { background: #060d1a; }
    </style>
  </head>
  <body style="background:#060d1a;margin:0;padding:0;overflow:hidden;">

    <!-- Güvenli yükleme ekranı: React yüklenmeden önce görünür, CSS'e bağımlı değil -->
    <div id="safe-loader" style="
      position:fixed;top:0;left:0;right:0;bottom:0;
      z-index:99999;
      background:#060d1a;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      color:#e2e8f0;
      font-family:system-ui,sans-serif;
      gap:16px;
      text-align:center;
      padding:24px;
    ">
      <div style="width:48px;height:48px;">
        <svg viewBox="0 0 48 48" width="48" height="48" fill="none">
          <circle cx="24" cy="24" r="20" stroke="#3b82f6" stroke-width="3"/>
          <circle cx="24" cy="24" r="5" fill="#3b82f6"/>
          <line x1="24" y1="11" x2="24" y2="19" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="24" y1="29" x2="24" y2="37" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="11" y1="24" x2="19" y2="24" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="29" y1="24" x2="37" y2="24" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div style="font-size:18px;font-weight:700;letter-spacing:0.15em;color:#fff;">Caros Pro</div>
      <div id="loader-status" style="font-size:13px;color:#3b82f6;">Başlatılıyor...</div>
      <div id="loader-bar-wrap" style="width:120px;height:2px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;">
        <div id="loader-bar" style="height:100%;width:0%;background:#3b82f6;border-radius:2px;transition:width 2s linear;"></div>
      </div>
    </div>

    <script>
    // Global error capture — React başlamadan önceki hataları yakalar
    var bootstrapError = null;
    window.onerror = function(msg, url, line, col, error) {
      bootstrapError = msg + " (satır: " + line + ")";
      console.error("Bootstrap Crash:", msg, error);
      return false;
    };

    (function() {
      try {
        setTimeout(function() {
          var bar = document.getElementById('loader-bar');
          if (bar) bar.style.width = '80%';
        }, 100);

        var checkInterval = setInterval(function() {
          var root = document.getElementById('root');
          var loader = document.getElementById('safe-loader');
          if (root && root.childElementCount > 0 && loader) {
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 200ms';
            setTimeout(function() {
              if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
            }, 250);
            clearInterval(checkInterval);
          }
        }, 200);

        // 10 saniye (daha hızlı tepki) sonra hala açılmadıysa
        setTimeout(function() {
          var root = document.getElementById('root');
          var status = document.getElementById('loader-status');
          var loader = document.getElementById('safe-loader');
          
          if (root && root.childElementCount === 0 && status) {
            status.style.color = '#ef4444';
            status.style.fontWeight = 'bold';
            status.textContent = 'BAŞLATILAMADI';
            
            var errBox = document.createElement('div');
            errBox.style.cssText = 'background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);padding:12px;border-radius:8px;font-size:11px;color:#f87171;margin-top:16px;max-width:280px;font-family:monospace;';
            errBox.textContent = bootstrapError || 'Bilinmeyen bir script hatası veya ağ sorunu oluştu.';
            loader.appendChild(errBox);

            var retryBtn = document.createElement('button');
            retryBtn.textContent = 'YENİDEN DENE';
            retryBtn.onclick = function() { window.location.reload(); };
            retryBtn.style.cssText = 'margin-top:16px;padding:10px 20px;background:#3b82f6;color:white;border:none;border-radius:8px;font-weight:bold;';
            loader.appendChild(retryBtn);
          }
        }, 10000);
      } catch(e) {}
    })();
    </script>

    <div id="root" style="position:fixed;top:0;left:0;right:0;bottom:0;width:100%;height:100%;background:#060d1a;overflow:hidden;"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
