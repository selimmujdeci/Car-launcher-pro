apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

def keyPropertiesFile = rootProject.file("key.properties")
def keyProperties = new Properties()
if (keyPropertiesFile.exists()) {
    keyPropertiesFile.withReader('UTF-8') { reader -> keyProperties.load(reader) }
}

android {
    namespace = "com.cockpitos.pro"
    compileSdk = rootProject.ext.compileSdkVersion
    // Native-Core (Phase N1): pin'li NDK + CMake toolchain
    ndkVersion rootProject.ext.ndkVersion
    defaultConfig {
        applicationId "com.cockpitos.pro"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // Sürüm yönetimi (#11): Play Store her yüklemede STRICT artan bir tamsayı ister.
        // versionCode HER YAYINDA elle +1 artırılır (manuel monotonik — CI/git-count YOK).
        // versionName insan-okur etikettir; release'te ikisi birlikte güncellenir.
        versionCode 2
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        // Head unit'ler ARM — x86/x86_64 native kütüphaneleri (~18MB, çoğu Vosk) gereksiz yük.
        // Sadece ARM tut → APK ~18MB küçülür. (Hepsi 64-bit ise armeabi-v7a da çıkarılıp ~8MB daha düşürülebilir.)
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a'
        }
        // Native-Core (Phase N1): C++ derleme bayrakları.
        // NEON → DSP/sensör hot-path; armeabi-v7a için açıkça açılır (arm64'te zaten varsayılan).
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17"
                arguments "-DANDROID_ARM_NEON=TRUE"
            }
        }
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (keyProperties['RELEASE_STORE_FILE']) {
                storeFile     file(keyProperties['RELEASE_STORE_FILE'])
                storePassword keyProperties['RELEASE_STORE_PASSWORD']
                keyAlias      keyProperties['RELEASE_KEY_ALIAS']
                keyPassword   keyProperties['RELEASE_KEY_PASSWORD']
            }
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
            debuggable true
        }
    }
    // Native-Core (Phase N1): vehicle_core kütüphanesi CMake derlemesi
    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }
    // Kotlin bytecode hedefi, Java 21 (capacitor.build.gradle) ile hizalı
    kotlinOptions {
        jvmTarget = "21"
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    // Native-Core (Phase N1): Kotlin standart kütüphanesi
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlinVersion"
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation 'com.google.android.material:material:1.12.0'
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation 'com.google.firebase:firebase-messaging:24.1.1'
    implementation 'androidx.security:security-crypto:1.1.0-alpha06'
    // USB-to-serial: CH340, CP2102, FTDI, CDC ACM desteği (CAN bus USB adaptörleri)
    implementation 'com.github.mik3y:usb-serial-for-android:3.8.0'
    // Vosk — offline, Google'sız, cihazda Türkçe ses tanıma (Katman 1 STT).
    // Model assets/vosk-model-tr içinde gömülü; internet/GMS gerekmez.
    implementation 'com.alphacephei:vosk-android:0.3.47'
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
